<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>나 어떻게 될까? 🍜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --pink: #FF6B9D;
    --mint: #5BC8AF;
    --yellow: #FFD93D;
    --bg: #FFF5F8;
    --dark: #2D2D2D;
    --soft: #F0F0F0;
  }

  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── SCREENS ── */
  .screen {
    width: 100vw;
    height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: absolute;
    top: 0; left: 0;
  }
  .screen.active { display: flex; }

  /* ── SCREEN 1: CHOICE ── */
  #screen-choice {
    background: linear-gradient(160deg, #FFF0F5 0%, #F0FFF8 100%);
  }

  .top-label {
    font-size: 13px;
    font-weight: 700;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .question {
    font-size: 22px;
    font-weight: 800;
    color: var(--dark);
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.4;
  }

  /* Characters split */
  .characters {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 340px;
    height: 200px;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    position: relative;
  }

  .char-half {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 16px;
    position: relative;
    cursor: pointer;
    transition: flex 0.4s cubic-bezier(.4,0,.2,1);
  }
  .char-half:hover { flex: 1.15; }

  .char-slim { background: linear-gradient(180deg, #C8F6E8 0%, #5BC8AF 100%); }
  .char-chubby { background: linear-gradient(180deg, #FFD6E7 0%, #FF6B9D 100%); }

  .char-label {
    position: absolute;
    top: 14px;
    font-size: 11px;
    font-weight: 800;
    color: white;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .char-svg {
    width: 90px;
    height: 120px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    transition: transform 0.3s;
  }
  .char-half:hover .char-svg { transform: translateY(-6px) scale(1.05); }

  /* Divider line */
  .divider-line {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 3px;
    background: white;
    transform: translateX(-50%);
    z-index: 10;
  }

  /* Choices grid */
  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 340px;
  }

  .choice-btn {
    background: white;
    border: none;
    border-radius: 16px;
    padding: 14px 10px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    line-height: 1.3;
    text-align: center;
  }
  .choice-btn:active { transform: scale(0.95); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

  .choice-btn .emoji { font-size: 22px; }
  .choice-btn.good { border-bottom: 3px solid var(--mint); }
  .choice-btn.bad  { border-bottom: 3px solid var(--pink); }

  /* ── SCREEN 2: RESULT ── */
  #screen-result {
    background: #FFF5F8;
  }

  .result-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 320px;
  }

  .result-char-box {
    width: 200px;
    height: 240px;
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 20px;
    margin-bottom: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    animation: bounceIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-char-slim  { background: linear-gradient(180deg, #C8F6E8 0%, #5BC8AF 100%); }
  .result-char-chubby { background: linear-gradient(180deg, #FFD6E7 0%, #FF6B9D 100%); }

  .result-char-svg { width: 130px; height: 170px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.18)); }

  .result-msg {
    font-size: 20px;
    font-weight: 800;
    color: var(--dark);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .result-sub {
    font-size: 14px;
    color: #999;
    text-align: center;
    margin-bottom: 28px;
  }

  .btn-back {
    background: var(--dark);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 15px 40px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    transition: transform 0.15s;
  }
  .btn-back:active { transform: scale(0.95); }

  /* Confetti particles */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
  }
  .confetti-p {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Shake animation for chubby result */
  @keyframes wobble {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }
  .wobble { animation: wobble 0.4s ease 0.5s 3; }
</style>
</head>
<body>

<!-- SCREEN 1: CHOICE -->
<div class="screen active" id="screen-choice">

  <ellipse cx="62" cy="116" rx="10" ry="5.5" fill="#2D2D2D"/>
`;

function showResult(type, msg, sub, emoji) {
  const box = document.getElementById('result-char-box');
  const svg = document.getElementById('result-svg');
  const msgEl = document.getElementById('result-msg');
  const subEl = document.getElementById('result-sub');

  if (type === 'slim') {
    box.className = 'result-char-box result-char-slim';
    svg.innerHTML = SLIM_SVG;
    spawnConfetti(['#5BC8AF','#C8F6E8','#FFD93D','#fff']);
  } else {
    box.className = 'result-char-box result-char-chubby wobble';
    svg.innerHTML = CHUBBY_SVG;
    spawnConfetti(['#FF6B9D','#FFD6E7','#FFD93D','#fff']);
  }

  msgEl.textContent = msg;
  subEl.textContent = sub;

  document.getElementById('screen-choice').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
}

function goBack() {
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-choice').classList.add('active');
  document.getElementById('confetti').innerHTML = '';
  // remove wobble
  document.getElementById('result-char-box').classList.remove('wobble');
}

function spawnConfetti(colors) {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-p';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    wrap.appendChild(p);
  }
}
</script>
